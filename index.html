      .lcp-banner-container {

        margin: 20px auto;
        padding: 10px 16px;
        box-sizing: border-box;
        overflow: hidden;
      }

      .banner-row-img {
        width: 100%;
        aspect-ratio: 5 / 3;
        height: auto;
        object-fit: cover;
        display: block;
        border-radius: 12px;
        box-shadow: var(--banner-shadow);
        border: var(--banner-border);
        background-color: #e2e8f0;
        transition: transform 0.25s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      }

      .blur-up {
        filter: blur(10px);
        transition: filter 0.35s ease;
      }

      .blur-up.is-loaded {
        filter: blur(0);
      }

      .banner-link {
        display: block;
        text-decoration: none;
      }

      #root.app-loaded .app-loading {

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const root = document.getElementById("root");
        
        // Failsafe class toggle
        setTimeout(() => {
             if (root && !root.classList.contains("app-loaded")) {
               root.classList.add("app-loaded");
             }
        }, 4000);

        // Mobile Gestures Block
        const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        if (!isTouch) return;

        document.addEventListener("touchmove", function (e) {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener("touchend", function (e) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) e.preventDefault();
          lastTouchEnd = now;
        }, { passive: false });
      });
    </script>
