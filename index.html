    <link rel="icon" href="/favicon.webp" type="image/webp" />

    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="preload" as="image" href="/logo.webp" fetchpriority="high" />

    <!-- NOTE: Replace YOUR_FIRST_BANNER_PUBLIC_ID with real public id OR remove this preload -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dpdecxqb9/image/upload/f_auto,q_auto,w_600,c_limit/YOUR_FIRST_BANNER_PUBLIC_ID"
      fetchpriority="high"
    />

    <style>
      :root {
        --font: "Baloo 2", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial,
          "Noto Sans", "Helvetica Neue", sans-serif;
        --banner-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        --banner-border: 1px solid transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: var(--font);
      }

      /* ✅ Prevent layout jump while React loads */
      #root {
        min-height: 100vh;
        width: 100%;
        max-width: none;
      }

      .app-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        text-align: center;
        padding: 40px;
      }

      /* ✅ Critical banner styles for LCP */
      .lcp-banner-container {
        width: 100%;
        margin: 20px auto;
        padding: 10px 0;
        overflow: hidden;
      }

      .lcp-banner {
        padding: 0 8px;
        box-sizing: border-box;
        max-width: 100%;
      }

      .banner-row-img {
        width: 100%;
        aspect-ratio: 5 / 3;
        height: auto;
        object-fit: cover;
        display: block;
        border-radius: 10px;
        box-shadow: var(--banner-shadow);
        border: var(--banner-border);
        transition: transform 0.25s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      }

      .blur-up {
        filter: blur(10px);
        transition: filter 0.35s ease;
      }

      .blur-up.is-loaded {
        filter: blur(0);
      }

      .banner-link {
        display: block;
        text-decoration: none;
      }

      /* ✅ Remove loading UI once app mounts */
      #root.app-loaded .app-loading {
        display: none;
      }

      /* ✅ Hide critical banner after app mounts (so it doesn't interfere) */
      #root.app-loaded .lcp-banner-container {
        display: none;
      }
    </style>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Manufacturer",
        "name": "Bafna Toys",
        "image": "https://bafnatoys.com/logo.webp",
        "url": "https://bafnatoys.com",
        "telephone": "+91-9043347300",
        "description": "Bafna Toys is a leading toy manufacturer and wholesale supplier in Coimbatore, Tamil Nadu. We produce PVC dolls, windup toys, pullback series cars, squeeze toys, educational toys, and rattles.",
        "priceRange": "₹100-₹2000 (Wholesale)",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "1-12, Sundapalayam Rd, Kalikkanaicken Palayam",
          "addressLocality": "Coimbatore",
          "addressRegion": "Tamil Nadu",
          "postalCode": "641007",
          "addressCountry": "IN"
        },
        "makesOffer": [
          { "@type": "Product", "name": "PVC Dolls" },
          { "@type": "Product", "name": "Jumping Key Toys" },
          { "@type": "Product", "name": "Windup Key Toys" },
          { "@type": "Product", "name": "Squeeze Toys" },
          { "@type": "Product", "name": "Pullback Series Cars" },
          { "@type": "Product", "name": "Educational Toys" },
          { "@type": "Product", "name": "Rattles Toys" }
        ],
        "sameAs": ["https://www.facebook.com/bafnatoys", "https://www.instagram.com/bafnatoys"]
      }
    </script>
  </head>

  <body>
    <div id="root">
      <noscript>
        <p style="text-align: center; padding: 20px; font-size: 18px">
          Please enable JavaScript to view BafnaToys.
        </p>
      </noscript>

      <div class="lcp-banner-container">
        <div class="lcp-banner">
          <a href="https://bafnatoys.com/shop" class="banner-link">
            <img
              src="https://res.cloudinary.com/dpdecxqb9/image/upload/f_auto,q_auto,w_600,c_limit/YOUR_FIRST_BANNER_PUBLIC_ID"
              alt="Bafna Toys Special Offer - Shop Now"
              width="600"
              height="360"
              fetchpriority="high"
              loading="eager"
              decoding="sync"
              class="banner-row-img blur-up"
              onload="this.classList.add('is-loaded')"
            />
          </a>
        </div>
      </div>

      <div class="app-loading">
        <img
          src="/logo.webp"
          alt="BafnaToys Wholesale Loading"
          width="80"
          height="80"
          style="opacity: 0.85"
          fetchpriority="low"
          decoding="async"
        />
        <p>Loading BafnaToys…</p>
      </div>
    </div>

    <script>
      // ✅ Robust: hide loader ASAP + fallback on full load
      (function () {
        function markLoaded() {
          var root = document.getElementById("root");
          if (root) root.classList.add("app-loaded");
        }
        document.addEventListener("DOMContentLoaded", markLoaded);
        window.addEventListener("load", markLoaded);
      })();

      // ✅ Disable Mobile Zoom (Pinch + Double Tap)
      (function () {
        const isTouch =
          "ontouchstart" in window || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);

        if (!isTouch) return;

        // Block pinch zoom (2 finger)
        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches && e.touches.length > 1) e.preventDefault();
          },
          { passive: false }
        );

        // Block double tap zoom
        let lastTouchEnd = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
          },
          { passive: false }
        );

        // iOS Safari gesture events
        document.addEventListener(
          "gesturestart",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
        document.addEventListener(
          "gesturechange",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
        document.addEventListener(
          "gestureend",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
      })();
    </script>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
