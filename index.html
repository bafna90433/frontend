    <style>

          src="/logo.webp"

          decoding="async"
        />
        <p style="color: #64748b; font-weight: 500;">Loading BafnaToys…</p>
      </div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const root = document.getElementById("root");
        
        // Failsafe class toggle
        setTimeout(() => {
             if (root && !root.classList.contains("app-loaded")) {
               root.classList.add("app-loaded");
             }
        }, 4000);

        // Mobile Gestures Block
        const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        if (!isTouch) return;

        document.addEventListener("touchmove", function (e) {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener("touchend", function (e) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) e.preventDefault();
          lastTouchEnd = now;
        }, { passive: false });
      });
    </script>

    <script>
    // ✅ Defer Facebook Pixel until browser is idle OR first user interaction
    // This frees up main thread during LCP — saves ~150 KiB + cache-lifetime hit
    (function () {
      var fbLoaded = false;
      function loadFbPixel() {
        if (fbLoaded) return;
        fbLoaded = true;
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1238757191757343');
        fbq('track', 'PageView');
      }
      // Load on first interaction (click / scroll / keydown / touch)
      var events = ['click', 'scroll', 'keydown', 'touchstart', 'mousemove'];
      events.forEach(function (ev) {
        window.addEventListener(ev, loadFbPixel, { once: true, passive: true });
      });
      // Fallback: load after 4s if no interaction
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadFbPixel, { timeout: 4000 });
      } else {
        setTimeout(loadFbPixel, 4000);
      }
    })();
    </script>
