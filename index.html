    <style>
      :root {
        --font: "Baloo 2", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial,
          "Noto Sans", "Helvetica Neue", sans-serif;
        --banner-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        --banner-border: 1px solid transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: var(--font);
      }

      #root {
        min-height: 100vh;
        width: 100%;
        max-width: none;
      }

      .app-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        text-align: center;
        padding: 40px;
      }

      .lcp-banner-container {
        width: 100%;
        margin: 20px auto;
        padding: 10px 0;
        overflow: hidden;
      }

      .lcp-banner {
        padding: 0 8px;
        box-sizing: border-box;
        max-width: 100%;
      }

      .banner-row-img {
        width: 100%;
        aspect-ratio: 5 / 3;
        height: auto;
        object-fit: cover;
        display: block;
        border-radius: 10px;
        box-shadow: var(--banner-shadow);
        border: var(--banner-border);
        transition: transform 0.25s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      }

      .blur-up {
        filter: blur(10px);
        transition: filter 0.35s ease;
      }

      .blur-up.is-loaded {
        filter: blur(0);
      }

      .banner-link {
        display: block;
        text-decoration: none;
      }

      /* ✅ Hide loader only after React marks app-loaded */
      #root.app-loaded .app-loading {
        display: none;
      }

      /* ✅ Hide critical banner after app mounts */
      #root.app-loaded .lcp-banner-container {
        display: none;
      }
    </style>

      <div class="app-loading">
        <img
          src="/logo.webp"
          alt="BafnaToys Wholesale Loading"
          width="80"
          height="80"
          style="opacity: 0.85"
          fetchpriority="low"
          decoding="async"
        />
        <p>Loading BafnaToys…</p>
      </div>
    </div>

    <script>
      // ✅ Fallback ONLY (if app-loaded not set by React)
      (function () {
        window.addEventListener("load", function () {
          setTimeout(function () {
            var root = document.getElementById("root");
            if (root && !root.classList.contains("app-loaded")) root.classList.add("app-loaded");
          }, 4000);
        });
      })();

      // ✅ Disable Mobile Zoom (Pinch + Double Tap)
      (function () {
        const isTouch =
          "ontouchstart" in window || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);

        if (!isTouch) return;

        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches && e.touches.length > 1) e.preventDefault();
          },
          { passive: false }
        );

        let lastTouchEnd = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
          },
          { passive: false }
        );

        document.addEventListener(
          "gesturestart",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
        document.addEventListener(
          "gesturechange",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
        document.addEventListener(
          "gestureend",
          function (e) {
            e.preventDefault();
          },
          { passive: false }
        );
      })();
    </script>

    <script type="module" src="/src/index.tsx"></script>
