    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const root = document.getElementById("root");
        
        // Failsafe class toggle
        const fallbackTimer = setTimeout(() => {
             if (root) root.classList.add("app-loaded");
        }, 3000);

        // Mobile Gestures Block
        const isTouch = "ontouchstart" in window || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
        if (!isTouch) return;

        document.addEventListener("touchmove", function (e) {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener("touchend", function (e) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) e.preventDefault();
          lastTouchEnd = now;
        }, { passive: false });

        const preventGestures = (e) => e.preventDefault();
        document.addEventListener("gesturestart", preventGestures, { passive: false });
        document.addEventListener("gesturechange", preventGestures, { passive: false });
        document.addEventListener("gestureend", preventGestures, { passive: false });
      });
    </script>
